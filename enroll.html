<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll here!!</title>
</head>
<body>
    <header>
        <div>
            <h1>
                MY COLLEGE REGISTRATION PAGE
            </h1>
        </div>
        <hr>
        <nav>
            <div>
                <a href="/index.html">
                    <button>
                        Home
                    </button>
                </a>
            </div>
            <div>
                <a href="/about.html">
                    <button>
                        About Us
                    </button>
                </a>
            </div>
            <div>
                <a href="/program.html">
                    <button>
                        Programs
                    </button>
                </a>
            </div>
            <div>
                <a href="/campus.html">
                    <button>
                        Campus Life
                    </button>
                </a>
            </div>
            <div>
                <a href="/enroll.html">
                    <button>
                        Enroll NOW
                    </button>
                </a>
            </div>
        </nav>
        <hr>
    </header>
    <main>
        <div>
            <h1>
                ENROLL HERE!
            </h1>
        </div>
        <form action="/enroll.html">
            <div>
                <ul>
                    <li>
                        <label for="sname">Name Of Student: </label>
                        <input type="text" placeholder="Enter Name" required id="sname">
                    </li>
                    <br>
                    <li>
                        <label for="fname">Name Of Father: </label>
                        <input type="text" placeholder="Enter Father Name" required id="fname">
                    </li>
                    <br>
                    <li>
                        <label for="mname">Name Of Mother: </label>
                        <input type="text" placeholder="Enter Mother Name" required id="mname">
                    </li>
                    <br>
                    <li>
                        <label for="email">Email: </label>
                        <input type="email" placeholder="Email" required id="email">
                    </li>
                    <br>
                    <li>
                        <label for="num">Contact num: </label>
                        <input type="number" placeholder="Enter your contact number" required id="num">
                    </li>
                    <br>
                    <li>
                        <label for="date">Date of birth: </label>
                        <input type="date" placeholder="Date of birth" required id="date">
                    </li>
                    <br>
                    <li>
                        <p>Gender: </p>
                    </li>
                    <input type="radio" required name="fav_language" id="gen1">
                    <label for="gen1">Male </label>

                    <input type="radio" required name="fav_language" id="gen2">
                    <label for="gen2">Female </label>

                    <input type="radio" required name="fav_language" id="gen3">
                    <label for="gen3">Others </label>
                    <br>
                    <br>
                    <li>
                        <label for="focu">Fathers occupation </label>
                        <input type="text" placeholder="father occupation" required id="focu">
                    </li>
                    <br>
                    <li>
                        <label for="mocu">Mothers Occupation </label>
                        <input type="text" placeholder="Mothers Occupation" required id="mocu">
                    </li>
                    <br>
                    <li>
                        <p>Interested in Branch:  </p>
                    </li>
                    <input type="radio" required name="fav" id="genn1">
                    <label for="genn1">CSE </label>

                    <input type="radio" required name="fav" id="genn2">
                    <label for="genn2">Civil </label>

                    <input type="radio" required name="fav" id="genn3">
                    <label for="genn3">Machanical </label>
                    <br>
                    <br>
                    <li>
                        <label for="why">Why are you interested in this branch choosen </label>
                        <textarea name="reason" id="why" maxlength="50"></textarea>
                    </li>
                    <br>
                    <input type="submit" >
                    <hr>
                </ul>
            </div>
        </form>
    </main>
    <footer>
        <div style="padding: 29px; background-color: grey;color: black;">
            Copyright © 2026, All Rights Reserved. MY College of Engineering & Technology.  
        </div>
    </footer>
</body>
</html>
